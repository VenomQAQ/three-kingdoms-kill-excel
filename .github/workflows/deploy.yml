name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # 保留私钥换行；格式错误时尽早失败
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_USER="${SSH_USER:-tkdeploy}"
          echo "Testing SSH as ${SSH_USER}@${SSH_HOST} ..."
          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" "echo ssh_ok"

      - name: Rsync to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_USER="${SSH_USER:-tkdeploy}"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --exclude node_modules \
            --exclude dist \
            --exclude dist-dev \
            --exclude .git \
            --exclude server/data \
            --exclude server/.env \
            ./ "${SSH_USER}@${SSH_HOST}:/www/wwwroot/three-kingdoms-kill/"

      - name: Build and restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER || 'tkdeploy' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: bash /www/wwwroot/three-kingdoms-kill/scripts/deploy-remote.sh
