# =========================================================
# Auth · 改密 (R-5)
# =========================================================
  - id: TC-A-020
    ref_req: R-5
    priority: P0
    type: integration
    title: 改密成功后旧 access 立即失效
    steps: [login (tab1) → login (tab2) → tab1 改密 → tab2 用旧 access 请求 /api/auth/me]
    expected: [tab2 请求 401，code:"E_UNAUTHORIZED"]
  - id: TC-A-021
    ref_req: R-5
    priority: P0
    type: integration
    title: 改密成功后所有 refresh 作废
    steps: [改密 → 用旧 tk_rt 请求 /api/auth/refresh]
    expected: [401, code:"E_REFRESH_EXPIRED" 或 REUSED]
  - id: TC-A-022
    ref_req: R-5
    priority: P0
    type: integration
    title: 原密码错误改密失败
    expected: [400, code:"E_PASSWORD_MISMATCH"]
  - id: TC-A-023
    ref_req: R-5
    priority: P0
    type: e2e
    title: 改密广播 auth:invalidated 到其他标签页
    steps: [tab1/tab2 同账号登录 → tab1 改密 → 等 socket 事件]
    expected: [tab2 收到 auth:invalidated{reason:'password-changed'} 后跳登录页]
  - id: TC-A-024
    ref_req: R-5
    priority: P1
    type: integration
    title: 新密码不合规改密失败
    expected: [400, code:"E_WEAK_PASSWORD"]

# =========================================================
# Auth · Refresh 旋转 (R-4)
# =========================================================
  - id: TC-A-030
    ref_req: R-4
    priority: P0
    type: integration
    title: refresh 成功旋转旧 refresh 失效
    steps: [refresh(rt1) → 得到 rt2 → 再次用 rt1 refresh]
    expected: [第二次 rt1 收到 E_REFRESH_REUSED；此账号所有 refresh 拉黑]
  - id: TC-A-031
    ref_req: R-4
    priority: P0
    type: integration
    title: 5 秒内并发 refresh 不拉黑（重复请求）
    steps: [同一 rt 并发 2 次 refresh，间隔 ≤ 5s]
    expected:
      - 一个成功、一个 E_REFRESH_REUSED
      - 数据库 refresh_token 未整族拉黑；后续用新 rt 仍可 refresh
  - id: TC-A-032
    ref_req: R-4
    priority: P0
    type: integration
    title: refresh 超期
    steps: [advance-clock 604801s → refresh]
    expected: [401, code:"E_REFRESH_EXPIRED"]
  - id: TC-A-033
    ref_req: R-4
    priority: P0
    type: integration
    title: access 超期后前端自动 refresh 一次
    steps: [advance-clock 3601s → 前端调 /api/auth/me]
    expected:
      - http 层看到 401 → 自动 POST /api/auth/refresh → 再次 me 成功
      - 只重试一次；再次 401 则跳登录
  - id: TC-A-034
    ref_req: R-4
    priority: P1
    type: integration
    title: 盗用 refresh 触发全账号踢下线
    steps: [rt1 refresh 成功 → 5s 后用 rt1 再 refresh]
    expected: [E_REFRESH_REUSED；auth:invalidated 广播到所有 socket；后续 refresh 全失败]

# =========================================================
# Session · 断线保坐 (R-4)
# =========================================================
  - id: TC-S-001
    ref_req: R-4
    priority: P0
    type: e2e
    title: 断线 4 分钟内重连座位保留
    steps: [登录 → 加入房间 → 断 socket → advance-clock 240s → 重连]
    expected: [rebind 成功，玩家仍在房间座位；引擎绑定保持]
  - id: TC-S-002
    ref_req: R-4
    priority: P0
    type: e2e
    title: 断线超过 5 分钟座位被回收
    steps: [同上 → advance-clock 301s → 重连]
    expected: [rebind 失败，房间不再包含该玩家]
  - id: TC-S-003
    ref_req: R-4
    priority: P0
    type: e2e
    title: 改密触发时立即回收座位（不受 5 分钟保护）
    steps: [tab1 登录进房间 → tab2 改密]
    expected: [tab1 立即断线；座位立即回收，不等 5 分钟]
  - id: TC-S-004
    ref_req: R-4
    priority: P1
    type: e2e
    title: 未进入房间的断线不触发 reclaim 计时器
    steps: [登录未加房间 → 断线]
    expected: [无 scheduleReclaim 日志]

