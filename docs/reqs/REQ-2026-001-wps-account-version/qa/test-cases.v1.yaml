# =========================================================
# Auth · 注册 (R-3)
# =========================================================
  - id: TC-A-001
    ref_req: R-3
    ref_task: BE-4
    priority: P0
    type: integration
    title: 正常注册成功
    steps:
      - POST /api/auth/register with {email:"12345@qq.com",password:"Aa123456",nickname:"aa"}
    expected:
      - 201, ok:true, data.userId 存在
      - Set-Cookie tk_at 与 tk_rt 均存在，httpOnly, SameSite=Lax
      - 数据库 user 表新增一行，passwordHash 非明文
  - id: TC-A-002
    ref_req: R-3
    priority: P0
    type: integration
    title: 非 QQ 邮箱注册被拒
    steps: [POST register {email:"user@gmail.com",...}]
    expected: [400, code:"E_INVALID_EMAIL"]
  - id: TC-A-003
    ref_req: R-3
    priority: P0
    type: integration
    title: 密码不含数字被拒
    steps: [POST register {password:"abcdefgh",...}]
    expected: [400, code:"E_WEAK_PASSWORD"]
  - id: TC-A-004
    ref_req: R-3
    priority: P0
    type: integration
    title: 密码不含字母被拒
    steps: [POST register {password:"12345678",...}]
    expected: [400, code:"E_WEAK_PASSWORD"]
  - id: TC-A-005
    ref_req: R-3
    priority: P0
    type: integration
    title: 重复邮箱注册被拒
    steps: [POST register 同一邮箱两次]
    expected: [第 2 次 409, code:"E_USER_EXISTS"]
  - id: TC-A-006
    ref_req: R-3
    priority: P1
    type: integration
    title: 昵称前后 trim
    steps: [POST register {nickname:"  张三  "}]
    expected: [data.nickname == "张三"]

