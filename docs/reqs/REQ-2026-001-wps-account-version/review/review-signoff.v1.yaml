merged_conditions:
  - sandbox 房是否强制登录（建议：登录后可进；老 `/sandbox` 命令保留）
  - 未登录可见范围（建议：仅登录页可见，房间列表 / 大厅聊天不可见）
  - R-2 空白像素计算方法（建议：非表格背景色像素占视口面积比 ≤ 3%）
  - 版本切换入口（建议：Ribbon 按钮为主，`/version` 命令为辅）
  - 大厅聊天历史（建议：不持久化，仅滚动 100 条内存缓存；进入后 T=0 起接收）
  - 大厅聊天节流（建议：1 条/秒/账号，单条 ≤ 200 字符）
  - 存储选型偏好（建议：MVP 选 SQLite；生产可切 Postgres）
  - session TTL / 重连时限（建议：access 1h + refresh 7d；断线 5min 内自动重连保留 socket 状态）
  - 改密码后 session 处理（建议：所有 session 失效，强制全部标签页重新登录）
